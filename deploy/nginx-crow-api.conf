# Reverse proxy for crow-api. Place at /etc/nginx/sites-available/crow-api
# and symlink into sites-enabled. Replace __API_HOST__ with your hostname
# (e.g. 34-12-34-56.nip.io). certbot --nginx will add the TLS (443) block
# and an http->https redirect automatically.
#
# WebSocket upgrade headers are required for the socket.io chat feature.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name __API_HOST__;

    # Allow Supabase/large payloads if needed.
    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # WebSocket support (socket.io)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;  # keep long-lived WS connections open
        proxy_send_timeout 86400s;
    }
}
